<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>glyph-mi 2.7</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: Inter, Segoe UI, Arial, sans-serif; background: #090b12; color: #edf0ff; }
    .wrap { max-width: 940px; margin: 0 auto; padding: 56px 20px; }
    .card { border: 1px solid #202945; border-radius: 20px; padding: 34px; background: #10172a; }
    .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .brand img { width: 48px; height: 48px; }
    h1 { margin: 0 0 8px; font-size: 35px; }
    p { color: #bfcbe6; line-height: 1.58; margin: 0 0 10px; }
    .caps { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0 4px; }
    .cap { border: 1px solid #2e3d63; border-radius: 999px; padding: 6px 10px; font-size: 12px; color: #d5dfff; }
    .links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
    a { color: #d7e2ff; text-decoration: none; border: 1px solid #314164; padding: 10px 14px; border-radius: 10px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="brand">
        <img src="./assets/glyph-transparent.png" alt="Glyph logo">
        <strong>Glyph Metadata Intelligence</strong>
      </div>
      <h1>glyph-mi 2.7</h1>
      <p>Universal metadata intelligence core with product modules. Senza stays fully supported via adapter, and Cultiva foundation is prepared as a scaffold module.</p>
      <div class="caps">
        <span class="cap">universal contracts</span>
        <span class="cap">module-senza</span>
        <span class="cap">module-cultiva foundation</span>
      </div>
      <div class="links">
        <a href="https://github.com/krwg/glyph-mi">Repository</a>
        <a href="https://github.com/FlokeStudio/glyph-s">glyph-s</a>
        <a href="https://github.com/FlokeStudio/glyph-miO">glyph-miO</a>
      </div>
    </section>
  </main>
</body>
</html>
